<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Portofolio</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <nav class="admin-navbar">
      <div class="logo">Dashboard Admin</div>
      <div class="nav-actions">
        <span id="welcome-text" style="font-size:0.9rem; color: var(--text-gray);"></span>
        <a href="../index.html" target="_blank">Lihat Website</a>
        <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
      </div>
    </nav>

    <div class="admin-container">
      <!-- Form Tambah / Edit Tugas -->
      <div class="admin-card">
        <h2 id="form-title">Tambah Tugas Baru</h2>

        <div id="success-msg" class="success-msg"></div>
        <div id="error-msg" class="error-msg"></div>

        <form id="tugas-form" enctype="multipart/form-data">
          <input type="hidden" id="tugas-id" />

          <div class="form-group">
            <label for="judul">Judul Tugas</label>
            <input type="text" id="judul" name="judul" required />
          </div>

          <div class="form-group">
            <label for="deskripsi">Deskripsi</label>
            <textarea id="deskripsi" name="deskripsi"></textarea>
          </div>

          <div class="form-group">
            <label for="tanggal">Tanggal</label>
            <input type="date" id="tanggal" name="tanggal" required />
          </div>

          <div class="form-group">
            <label for="file">File Tugas (PDF, DOC, PPT, ZIP, dll)</label>
            <input type="file" id="file" name="file" />
            <small>Maks 10MB. Kosongkan jika tidak ingin mengganti file.</small>
            <div id="current-file"></div>
          </div>

          <button type="submit" id="submit-btn" class="btn">Simpan Tugas</button>
          <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display:none;">Batal Edit</button>
        </form>
      </div>

      <!-- Tabel Daftar Tugas -->
      <div class="admin-card">
        <h2>Daftar Tugas</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Judul</th>
                <th>Tanggal</th>
                <th>File</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tugas-table-body">
              <tr><td colspan="5">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
