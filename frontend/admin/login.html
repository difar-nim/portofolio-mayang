<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Portofolio</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-box">
        <h1>Login Admin</h1>
        <p class="subtitle">Masuk untuk mengelola data tugas</p>

        <div id="error-msg" class="error-msg"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-full">Masuk</button>
        </form>

        <p style="text-align:center; margin-top:15px;">
          <a href="../index.html" style="color: var(--primary-color); text-decoration:none; font-size:0.9rem;">&larr; Kembali ke Website</a>
        </p>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
